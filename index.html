<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
公务员行测竞技擂台
</title>


<style>


*{

box-sizing:border-box;

}



body{


margin:0;


height:100vh;


background:

radial-gradient(

circle at top,

#243b55,

#101820

);



font-family:

"Microsoft YaHei";


color:white;


text-align:center;


}





.container{


width:650px;


margin:40px auto;


}




.box{


background:

rgba(255,255,255,0.12);


backdrop-filter:

blur(10px);



border-radius:25px;


padding:35px;


box-shadow:


0 0 30px rgba(0,0,0,.5);


}




h1{


font-size:42px;


margin-bottom:10px;


text-shadow:

0 0 15px #00ffff;


}



h2{


color:#ffd700;


}






button{


width:85%;


padding:16px;


margin:10px;


border:none;


border-radius:15px;



font-size:20px;



cursor:pointer;



background:

linear-gradient(

135deg,

#00c6ff,

#0072ff

);



color:white;


transition:.3s;



}



button:hover{


transform:scale(1.05);


box-shadow:

0 0 20px #00ffff;


}





input{


width:80%;


padding:15px;


border-radius:12px;


border:none;


font-size:18px;


text-align:center;


}





.card{


background:

rgba(0,0,0,.25);



border-radius:20px;


padding:20px;


margin:20px 0;


}




.stat{


display:flex;


justify-content:space-around;


font-size:20px;


}





.gold{


color:#ffd700;


}




.enemy{


color:#ffcc00;


font-size:20px;


}





.option{


background:#fff;


color:#222;


text-align:left;


}





.option:hover{


background:#ffd700;


}





#game{


display:none;


}





#result{


display:none;


}



.room{


font-size:24px;


color:#00ff99;


}





</style>


</head>


<body>


<div class="container">

<!-- ===============================
     大厅界面
================================ -->


<div class="box" id="hall">



<h1>

⚔️ 公务员行测竞技擂台

</h1>



<p>

全国公考选手在线PK

</p>







<!-- 玩家信息 -->

<div class="card">


<h2>

👤 玩家战绩

</h2>



<div class="stat">


<div>

🏆积分

<br>

<span class="gold" id="myScore">

0

</span>

</div>



<div>

⚔️对局

<br>

<span id="battleCount">

0

</span>

</div>




<div>

📈胜率

<br>

<span id="winRate">

0%

</span>

</div>



</div>


</div>









<!-- 模式选择 -->


<div class="card">


<h2>

选择挑战模式

</h2>




<button onclick="selectMode('special')">


📚 专项突破


</button>



<div id="specialBox"

style="display:none;">



<button onclick="selectCategory('常识判断')">

常识判断

</button>



<button onclick="selectCategory('言语理解')">

言语理解

</button>



<button onclick="selectCategory('数量关系')">

数量关系

</button>



<button onclick="selectCategory('判断推理')">

判断推理

</button>



<button onclick="selectCategory('资料分析')">

资料分析

</button>



</div>







<button onclick="selectMode('quarter')">


🔥 四分之一套卷

(30题)


</button>




<button onclick="selectMode('half')">


⚡ 二分之一套卷

(60题)


</button>





<button onclick="selectMode('full')">


👑 完整套卷

(120题)


</button>



</div>









<!-- 房间 -->

<div class="card">


<h2>

开始匹配

</h2>



<p id="modeText">

当前模式：专项训练

</p>





<button onclick="createRoom()">


创建竞技房间


</button>





<input

id="roomInput"

placeholder="输入对手房间号"



>





<button onclick="joinRoom()">


加入战斗


</button>







<p id="roomShow"

class="room">


</p>



<p id="msg">


正在连接服务器...


</p>




</div>





</div>






<!-- ===============================
     PK答题界面
================================ -->


<div class="box" id="game">



<h1>

🔥 行测竞技中

</h1>





<div class="card">


<div class="stat">



<div>

你的积分

<br>

<span class="gold" id="score">

0

</span>


</div>






<div>


对手状态

<br>


<span class="enemy" id="enemy">


等待中


</span>


</div>



</div>


</div>









<div class="card">



<h3>


第

<span id="questionIndex">

1

</span>


题 / 共


<span id="questionTotal">

0

</span>


题


</h3>





<div id="question">


等待服务器出题...


</div>




</div>






</div>









<!-- ===============================
     比赛结果
================================ -->


<div class="box" id="result">



<h1>

🏆 比赛结果

</h1>





<div class="card">


<h2 id="resultText">


</h2>



<p id="finalScore">


</p>



</div>







<button onclick="location.reload()">



返回大厅



</button>





</div>









</div>


<script>


// ===============================
// WebSocket连接
// ===============================


let socket = new WebSocket(

"wss://gongkao-pk-server.onrender.com"

);





// ===============================
// 游戏数据
// ===============================


let room=null;


let myId=null;


let mode="special";


let category=null;


let currentQuestion=null;


let score=0;









// ===============================
// 连接成功
// ===============================


socket.onopen=function(){



document.getElementById(

"msg"

).innerHTML=


"服务器连接成功";



};









// ===============================
// 连接错误
// ===============================


socket.onerror=function(){



document.getElementById(

"msg"

).innerHTML=


"服务器连接失败";



};









// ===============================
// 接收服务器消息
// ===============================


socket.onmessage=function(e){



let data=

JSON.parse(e.data);




console.log(

"收到服务器:",

data

);









// 房间创建成功


if(data.type==="room"){



room=data.room;


myId=data.player;





document.getElementById(

"roomShow"

).innerHTML=


"房间号："+room;





document.getElementById(

"msg"

).innerHTML=


"等待对手加入...";



return;


}









// 开始比赛


if(data.type==="start"){



document.getElementById(

"hall"

).style.display="none";



document.getElementById(

"game"

).style.display="block";



return;


}









// 收到题目


if(data.type==="question"){



currentQuestion=

data.question;





document.getElementById(

"questionIndex"

).innerHTML=

data.index+1;





document.getElementById(

"questionTotal"

).innerHTML=

data.total;





showQuestion(

data.question

);



return;


}









// 答题结果


if(data.type==="result"){



score=data.score;



document.getElementById(

"score"

).innerHTML=

score;



document.getElementById(

"myScore"

).innerHTML=

score;



return;


}









// 对手状态


if(data.type==="enemy"){



document.getElementById(

"enemy"

).innerHTML=



"第"+

data.index+

"题 积分:"+

data.score;



return;


}









// 最终结果


if(data.type==="gameResult"){



document.getElementById(

"game"

).style.display="none";



document.getElementById(

"result"

).style.display="block";





if(data.win){



document.getElementById(

"resultText"

).innerHTML=


"🏆 胜利！";


}

else if(data.result==="draw"){



document.getElementById(

"resultText"

).innerHTML=


"🤝 平局";


}

else{


document.getElementById(

"resultText"

).innerHTML=


"😢 失败";


}





document.getElementById(

"finalScore"

).innerHTML=


"你的积分："+

data.myScore+

"<br>"+

"对手积分："+

data.enemyScore;



return;


}




};









// ===============================
// 选择模式
// ===============================


function selectMode(m){



mode=m;



category=null;



document.getElementById(

"modeText"

).innerHTML=


"当前模式："+m;





if(m==="special"){



document.getElementById(

"specialBox"

).style.display="block";


}

else{


document.getElementById(

"specialBox"

).style.display="none";


}



}









// ===============================
// 选择分类
// ===============================


function selectCategory(c){



category=c;



document.getElementById(

"modeText"

).innerHTML=


"当前分类："+c;



}


// ===============================
// 创建房间
// ===============================


function createRoom(){



    if(socket.readyState!==1){


        alert(

            "服务器未连接"

        );


        return;


    }








    socket.send(JSON.stringify({



        type:"create",



        mode:mode,



        category:category



    }));



}









// ===============================
// 加入房间
// ===============================


function joinRoom(){



    let r=

    document.getElementById(

        "roomInput"

    ).value.trim();







    if(!r){



        alert(

            "请输入房间号"

        );


        return;


    }








    socket.send(JSON.stringify({



        type:"join",



        room:r



    }));



}









// ===============================
// 显示题目
// ===============================


function showQuestion(q){



    let html=



    "<h2>"+

    q.q+

    "</h2>";









    q.options.forEach((op,i)=>{



        html+=`

        <button

        class="option"

        onclick="answer(${i})">


        ${op}


        </button>


        `;



    });








    document.getElementById(

        "question"

    ).innerHTML=html;



}









// ===============================
// 答题
// ===============================


function answer(choice){



    if(!currentQuestion){


        return;


    }







    socket.send(JSON.stringify({



        type:"answer",



        choice:choice



    }));







    document.getElementById(

        "question"

    ).innerHTML=


    "⌛ 等待判题...";



}






</script>


</body>


</html>
