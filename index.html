<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
公务员行测竞技擂台
</title>


<style>


*{

box-sizing:border-box;

}



*{
    box-sizing:border-box;
}



body{

    margin:0;

    min-height:100vh;


    background:

    radial-gradient(
        circle at 20% 10%,
        #00eaff55,
        transparent 35%
    ),

    radial-gradient(
        circle at 80% 20%,
        #b900ff55,
        transparent 40%
    ),

    linear-gradient(
        135deg,
        #16222a,
        #243b55,
        #1b1b3a
    );


    color:white;

    font-family:

    "Microsoft YaHei",
    Arial,
    sans-serif;


    overflow-x:hidden;

}







/* 主容器 */

.container{

    width:850px;

    max-width:95%;

    margin:40px auto;

}








/* 大标题 */


h1{


    font-size:52px;


    letter-spacing:5px;


    text-align:center;



    background:

    linear-gradient(
        90deg,
        #00ffff,
        #ffffff,
        #ffd700
    );


    -webkit-background-clip:text;

    color:transparent;



    text-shadow:

    0 0 20px #00ffff;



}






h2{

    color:#ffd700;

    text-shadow:

    0 0 10px #ff9900;


}









/* 毛玻璃卡片 */


.box,
.card{


    background:

    rgba(255,255,255,0.12);



    backdrop-filter:

    blur(18px);



    -webkit-backdrop-filter:

    blur(18px);



    border:

    1px solid

    rgba(255,255,255,0.25);



    border-radius:30px;



    padding:30px;



    margin:25px 0;



    box-shadow:


    0 0 40px rgba(0,255,255,0.15),


    inset 0 0 20px rgba(255,255,255,0.05);



}








/* 玩家数据 */


.stat{


    display:flex;

    justify-content:space-around;


    font-size:22px;


}



.gold{


    color:#ffd700;


    font-size:40px;


    text-shadow:

    0 0 15px gold;


}





.enemy{


    color:#00ffff;


    font-size:24px;


}









/* 所有按钮 */


button{


    width:85%;


    max-width:450px;


    padding:18px;


    margin:12px;



    border:none;


    border-radius:18px;



    font-size:21px;


    font-weight:bold;



    color:white;



    cursor:pointer;




    background:


    linear-gradient(

        135deg,

        #00c6ff,

        #0072ff

    );



    box-shadow:


    0 0 20px #00c6ff88;



    transition:.3s;


}





button:hover{


    transform:

    translateY(-5px)

    scale(1.03);



    box-shadow:


    0 0 35px #00ffff;


}








/* 金色冠军按钮 */


.goldBtn{


    background:


    linear-gradient(

        135deg,

        #ffd700,

        #ff8800

    );


    box-shadow:


    0 0 25px #ffd700;


}








/* 答题选项 */


.option,
.optionBtn{


    background:


    rgba(255,255,255,0.85);



    color:#111;



    text-align:left;



}



.option:hover,
.optionBtn:hover{


    background:#ffd700;


    color:#111;



}









/* 题目区域 */


.questionBox{


    background:


    rgba(255,255,255,0.18);



    backdrop-filter:

    blur(25px);



    border:

    2px solid

    rgba(0,255,255,0.5);



    box-shadow:


    0 0 40px

    rgba(0,255,255,.3);



}








/* 房间号 */


.room{


    font-size:32px;


    color:#00ff99;



    text-shadow:


    0 0 15px #00ff99;


}








input{


    width:80%;


    padding:16px;


    border-radius:15px;


    border:none;


    font-size:18px;


    text-align:center;



    background:

    rgba(255,255,255,.9);



}








#game{


    display:none;


}



#result{


    display:none;


}



/* ===============================
   赛博网格背景
================================ */


.cyber-grid{


    position:fixed;


    inset:0;


    pointer-events:none;



    background-image:


    linear-gradient(
        rgba(0,255,255,.08) 1px,
        transparent 1px
    ),


    linear-gradient(
        90deg,
        rgba(255,0,255,.08) 1px,
        transparent 1px
    );



    background-size:

    50px 50px;



    transform:

    perspective(500px)

    rotateX(60deg);



    transform-origin:center;



    animation:

    gridMove 8s linear infinite;



    opacity:.35;


}



@keyframes gridMove{


    from{


        background-position:

        0 0;


    }



    to{


        background-position:

        0 500px;


    }

}

/* ===============================
   战斗血条
================================ */


.battle-bar{

    display:flex;

    align-items:center;

    justify-content:space-around;

    margin:20px 0;

}



.fighter{

    width:35%;

    text-align:center;

    font-size:22px;

}



.vs{

    font-size:45px;

    font-weight:bold;

    color:#ff3366;

    text-shadow:
    0 0 20px red;

}



.hp{

    height:18px;

    background:
    rgba(255,255,255,.2);

    border-radius:20px;

    overflow:hidden;

    margin-top:10px;

}



.hp div{

    height:100%;

    width:100%;

    background:

    linear-gradient(
        90deg,
        #00ff99,
        #00ffff
    );

    box-shadow:
    0 0 20px cyan;

    transition:.5s;

}



.enemyHp div{

    background:

    linear-gradient(
        90deg,
        #ff0055,
        #ff9900
    );

    box-shadow:
    0 0 20px red;

}

</style>


</head>


<body>

<div class="cyber-grid"></div>


<div class="container">

<!-- ===============================
     大厅界面
================================ -->


<div class="box" id="hall">



<h1>

⚔️ 公务员行测竞技擂台

</h1>



<p>

全国公考选手在线PK

</p>







<!-- 玩家信息 -->

<div class="card">


<h2>

👤 玩家战绩

</h2>



<div class="stat">


<div>

🏆积分

<br>

<span class="gold" id="myScore">

0

</span>

</div>



<div>

⚔️对局

<br>

<span id="battleCount">

0

</span>

</div>




<div>

📈胜率

<br>

<span id="winRate">

0%

</span>

</div>



</div>


</div>









<!-- 模式选择 -->


<div class="card">


<h2>

选择挑战模式

</h2>




<button onclick="selectMode('special')">


📚 专项突破


</button>



<div id="specialBox"

style="display:none;">



<button onclick="selectCategory('常识判断')">

常识判断

</button>



<button onclick="selectCategory('言语理解')">

言语理解

</button>



<button onclick="selectCategory('数量关系')">

数量关系

</button>



<button onclick="selectCategory('判断推理')">

判断推理

</button>



<button onclick="selectCategory('资料分析')">

资料分析

</button>



</div>







<button onclick="selectMode('quarter')">


🔥 四分之一套卷

(30题)


</button>




<button onclick="selectMode('half')">


⚡ 二分之一套卷

(60题)


</button>





<button onclick="selectMode('full')">


👑 完整套卷

(120题)


</button>



</div>









<!-- 房间 -->

<div class="card">


<h2>

开始匹配

</h2>



<p id="modeText">

当前模式：专项训练

</p>





<button onclick="createRoom()">


创建竞技房间


</button>





<input

id="roomInput"

placeholder="输入对手房间号"



>





<button onclick="joinRoom()">


加入战斗


</button>







<p id="roomShow"

class="room">


</p>



<p id="msg">


正在连接服务器...


</p>




</div>





</div>






<!-- ===============================
     PK答题界面
================================ -->


<div class="box" id="game">



<h1>

🔥 行测竞技中

</h1>


<div class="battle-bar">


<div class="fighter">


<div>

玩家

</div>


<div class="hp">

<div id="myHp"></div>

</div>


</div>





<div class="vs">

VS

</div>





<div class="fighter">


<div>

对手

</div>


<div class="hp enemyHp">

<div id="enemyHp"></div>

</div>


</div>


</div>



<div class="card">


<div class="stat">



<div>

你的积分

<br>

<span class="gold" id="score">

0

</span>


</div>






<div>


对手状态

<br>


<span class="enemy" id="enemy">


等待中


</span>


</div>



</div>


</div>









<div class="card">



<h3>


第

<span id="questionIndex">

1

</span>


题 / 共


<span id="questionTotal">

0

</span>


题


</h3>





<div id="question">


等待服务器出题...


</div>




</div>






</div>









<!-- ===============================
     比赛结果
================================ -->


<div class="box" id="result">



<h1>

🏆 比赛结果

</h1>





<div class="card">


<h2 id="resultText">


</h2>



<p id="finalScore">


</p>



</div>







<button onclick="location.reload()">



返回大厅



</button>





</div>









</div>


<script>


// ===============================
// WebSocket连接
// ===============================


let socket = new WebSocket(

"wss://gongkao-pk-server.onrender.com"

);





// ===============================
// 游戏数据
// ===============================


let room=null;


let myId=null;


let mode="special";


let category=null;


let currentQuestion=null;


let score=0;









// ===============================
// 连接成功
// ===============================


socket.onopen=function(){



document.getElementById(

"msg"

).innerHTML=


"服务器连接成功";



};









// ===============================
// 连接错误
// ===============================


socket.onerror=function(){



document.getElementById(

"msg"

).innerHTML=


"服务器连接失败";



};









// ===============================
// 接收服务器消息
// ===============================


socket.onmessage=function(e){



let data=

JSON.parse(e.data);




console.log(

"收到服务器:",

data

);









// 房间创建成功


if(data.type==="room"){



room=data.room;


myId=data.player;





document.getElementById(

"roomShow"

).innerHTML=


"房间号："+room;





document.getElementById(

"msg"

).innerHTML=


"等待对手加入...";



return;


}









// 开始比赛


if(data.type==="start"){



document.getElementById(

"hall"

).style.display="none";



document.getElementById(

"game"

).style.display="block";



return;


}









// 收到题目


if(data.type==="question"){



currentQuestion=

data.question;





document.getElementById(

"questionIndex"

).innerHTML=

data.index+1;





document.getElementById(

"questionTotal"

).innerHTML=

data.total;





showQuestion(

data.question

);



return;


}









// 答题结果


if(data.type==="result"){



score=data.score;

document.getElementById(
"myHp"
).style.width =

Math.min(
100,
score/20
)+"%";

document.getElementById(

"score"

).innerHTML=

score;



document.getElementById(

"myScore"

).innerHTML=

score;



return;


}









// 对手状态


if(data.type==="enemy"){



document.getElementById(

"enemy"

).innerHTML=


document.getElementById(
"enemyHp"
).style.width =

Math.min(
100,
data.score/20
)+"%";

"第"+

data.index+

"题 积分:"+

data.score;



return;


}









// 最终结果


if(data.type==="gameResult"){



document.getElementById(

"game"

).style.display="none";



document.getElementById(

"result"

).style.display="block";





if(data.win){



document.getElementById(

"resultText"

).innerHTML=


"🏆 胜利！";


}

else if(data.result==="draw"){



document.getElementById(

"resultText"

).innerHTML=


"🤝 平局";


}

else{


document.getElementById(

"resultText"

).innerHTML=


"😢 失败";


}





document.getElementById(

"finalScore"

).innerHTML=


"你的积分："+

data.myScore+

"<br>"+

"对手积分："+

data.enemyScore;



return;


}




};









// ===============================
// 选择模式
// ===============================


function selectMode(m){



mode=m;



category=null;



document.getElementById(

"modeText"

).innerHTML=


"当前模式："+m;





if(m==="special"){



document.getElementById(

"specialBox"

).style.display="block";


}

else{


document.getElementById(

"specialBox"

).style.display="none";


}



}









// ===============================
// 选择分类
// ===============================


function selectCategory(c){



category=c;



document.getElementById(

"modeText"

).innerHTML=


"当前分类："+c;



}


// ===============================
// 创建房间
// ===============================


function createRoom(){



    if(socket.readyState!==1){


        alert(

            "服务器未连接"

        );


        return;


    }








    socket.send(JSON.stringify({



        type:"create",



        mode:mode,



        category:category



    }));



}









// ===============================
// 加入房间
// ===============================


function joinRoom(){



    let r=

    document.getElementById(

        "roomInput"

    ).value.trim();







    if(!r){



        alert(

            "请输入房间号"

        );


        return;


    }








    socket.send(JSON.stringify({



        type:"join",



        room:r



    }));



}









// ===============================
// 显示题目
// ===============================


function showQuestion(q){



    let html=



    "<h2>"+

    q.q+

    "</h2>";









    q.options.forEach((op,i)=>{



        html+=`

        <button

        class="option"

        onclick="answer(${i})">


        ${op}


        </button>


        `;



    });








    document.getElementById(

        "question"

    ).innerHTML=html;



}









// ===============================
// 答题
// ===============================


function answer(choice){



    if(!currentQuestion){


        return;


    }







    socket.send(JSON.stringify({



        type:"answer",



        choice:choice



    }));







    document.getElementById(

        "question"

    ).innerHTML=


    "⌛ 等待判题...";



}






</script>


</div>
</body>


</html>
