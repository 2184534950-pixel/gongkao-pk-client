<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
公务员行测竞技擂台
</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;

min-height:100vh;

background:
radial-gradient(circle at top,#1e3c72,#101820 60%);

color:white;

font-family:
"Microsoft YaHei",
Arial,
sans-serif;

}



.container{

width:900px;

max-width:95%;

margin:40px auto;

}



.title{

text-align:center;

font-size:48px;

font-weight:bold;

text-shadow:
0 0 15px #00ffff;

}



.subtitle{

text-align:center;

color:#ffd700;

font-size:20px;

margin-bottom:30px;

}




.card{


background:
rgba(255,255,255,.12);


border:
1px solid rgba(255,255,255,.2);


border-radius:25px;


padding:30px;


margin-bottom:25px;


box-shadow:
0 0 30px #0008;


}




.playerPanel{


display:flex;

justify-content:space-around;

text-align:center;


}



.stat{

font-size:22px;

}



.stat span{


display:block;


font-size:36px;


color:#ffd700;


margin-top:10px;


}




button{


width:80%;


max-width:400px;


padding:16px;


margin:12px;


border:none;


border-radius:15px;


font-size:20px;


cursor:pointer;


transition:.2s;


}



button:hover{

transform:scale(1.05);

}




.modeBtn{


background:

linear-gradient(
135deg,
#3498db,
#8e44ad
);


color:white;


}



.optionBtn{


background:#eeeeee;


color:#222;


}




.goldBtn{


background:

linear-gradient(
135deg,
#f1c40f,
#e67e22
);


}




.hidden{

display:none;

}




#game{

display:none;

}




.questionBox{


background:white;


color:#222;


border-radius:20px;


padding:25px;


}




.enemy{


color:#ffd700;


font-size:20px;


}



</style>

</head>


<body>



<div class="container">



<div id="hall">


<h1 class="title">

公务员行测竞技擂台

</h1>


<div class="subtitle">

⚔ 全国考生在线PK ⚔

</div>





<div class="card">


<h2>
我的战绩
</h2>



<div class="playerPanel">



<div class="stat">

竞技积分

<span id="scoreHistory">
0
</span>

</div>



<div class="stat">

对局次数

<span id="gameCount">
0
</span>

</div>




<div class="stat">

胜率

<span id="winRate">
0%
</span>

</div>



</div>


</div>





<div class="card">


<h2>
选择PK模式
</h2>




<button class="modeBtn"
onclick="createGame('special')">

分类专项PK

</button>




<button class="modeBtn"
onclick="createGame('quarter')">

四分之一套卷PK

</button>




<button class="modeBtn"
onclick="createGame('half')">

二分之一套卷PK

</button>




<button class="goldBtn"
onclick="createGame('full')">

完整120题套卷PK

</button>



</div>





<div class="card">


<h2>
加入好友房间
</h2>



<input
id="roomInput"
placeholder="输入6位房间号"
style="
padding:15px;
width:80%;
font-size:18px;
border-radius:10px;
border:none;
">


<br>



<button onclick="joinRoom()">

加入房间

</button>



<p id="msg">

正在连接服务器...

</p>



</div>



</div>






<!-- =========================
     游戏界面
========================= -->


<div id="game">



<div class="card">


<h2>

在线竞技中

</h2>




<div class="playerPanel">



<div>


你的积分


<div class="stat">


<span id="score">

0

</span>


</div>


</div>





<div class="enemy">


对手状态

<br>


<span id="enemy">

等待

</span>


</div>




</div>


</div>







<div class="card questionBox">


<div id="question">

等待服务器出题...

</div>


</div>



</div>






</div>








<script>





// =========================
// WebSocket服务器
// =========================



let socket = new WebSocket(

"wss://gongkao-pk-server.onrender.com"

);





let room=null;


let myId=null;


let currentQuestion=null;


let currentIndex=0;


let score=0;






// =========================
// 连接成功
// =========================



socket.onopen=function(){



document.getElementById("msg")

.innerHTML=

"服务器连接成功";



};







socket.onerror=function(){



document.getElementById("msg")

.innerHTML=

"服务器连接失败";


};









// =========================
// 接收服务器消息
// =========================



socket.onmessage=function(e){



let data=

JSON.parse(e.data);





console.log(

"服务器消息:",

data

);








// 创建房间成功


if(data.type==="room"){



room=data.room;


myId=data.player;





document.getElementById("msg")

.innerHTML=


"房间号："+room;



return;


}









// 游戏开始


if(data.type==="start"){



document.getElementById("hall")

.style.display="none";



document.getElementById("game")

.style.display="block";



return;


}









// =========================
// 服务器发题
// =========================


if(data.type==="question"){



currentQuestion=

data.question;



currentIndex=

data.index;



showQuestion();



return;


}








// 对手状态


if(data.type==="enemy"){



document.getElementById("enemy")

.innerHTML=


"第"+

data.index+

"题&nbsp;&nbsp;积分:"+

data.score;



return;


}








// 自己得分


if(data.type==="result"){



score=data.score;



document.getElementById("score")

.innerHTML=

score;



return;


}







// 答题完成


if(data.type==="finishQuestion"){



document.getElementById("question")

.innerHTML=

"答题完成，等待比赛结果";



return;


}







// 比赛结束


if(data.type==="finish"){



alert(

"玩家"+

data.player+

"提交完成"

);



return;


}







// 错误


if(data.type==="error"){


alert(data.msg);



return;


}





};


// =========================
// 创建房间
// =========================


function createGame(mode){



    if(socket.readyState!==1){


        alert("服务器未连接");


        return;


    }






    socket.send(JSON.stringify({



        type:"create",



        mode:mode



    }));



}









// =========================
// 加入房间
// =========================


function joinRoom(){



    let r =

    document.getElementById(

        "roomInput"

    ).value.trim();







    if(!r){


        alert("请输入房间号");


        return;


    }






    socket.send(JSON.stringify({



        type:"join",



        room:r



    }));



}









// =========================
// 显示服务器题目
// =========================


function showQuestion(){



    let q=currentQuestion;





    let html=



    "<h2>"+

    "第"+

    (currentIndex+1)

    +"题 【"+

    q.category+

    "】</h2>";







    html+=



    "<h3>"+

    q.q+

    "</h3>";







    q.options.forEach((op,i)=>{





        html+=`



        <button

        class="optionBtn"

        onclick="answer(${i})">


        ${op}


        </button>



        `;



    });







    document.getElementById(

        "question"

    ).innerHTML=html;



}









// =========================
// 答题
// =========================


function answer(choice){



    if(!currentQuestion){


        return;


    }







    let buttons=


    document.querySelectorAll(

        ".optionBtn"

    );






    buttons.forEach(btn=>{


        btn.disabled=true;


    });









    socket.send(JSON.stringify({



        type:"answer",



        choice:choice



    }));







}












// =========================
// 保存历史记录
// =========================


function saveHistory(win){



    let history=


    JSON.parse(


        localStorage.getItem(

            "pkHistory"

        )

        ||

        '{"score":0,"count":0,"win":0}'


    );







    history.count++;







    if(win){



        history.score+=10;


        history.win++;


    }







    localStorage.setItem(


        "pkHistory",


        JSON.stringify(history)


    );



}









// =========================
// 加载历史记录
// =========================


function loadHistory(){



    let history=


    JSON.parse(


        localStorage.getItem(

            "pkHistory"

        )

        ||

        '{"score":0,"count":0,"win":0}'


    );







    document.getElementById(

        "scoreHistory"

    ).innerHTML=

    history.score;








    document.getElementById(

        "gameCount"

    ).innerHTML=

    history.count;







    let rate=0;






    if(history.count>0){



        rate=Math.round(


            history.win /

            history.count *

            100


        );



    }








    document.getElementById(

        "winRate"

    ).innerHTML=

    rate+"%";



}







loadHistory();






</script>


</body>


</html>
