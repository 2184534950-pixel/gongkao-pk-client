<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>
公务员行测竞技擂台
</title>


<style>


body{

    background:
    linear-gradient(
        135deg,
        #101820,
        #1f4068
    );

    color:white;

    font-family:
    Microsoft YaHei;

    text-align:center;

}



.box{

    width:600px;

    margin:50px auto;

    background:#ffffff22;

    padding:30px;

    border-radius:20px;

    box-shadow:
    0 0 20px #000;


}



button{

    width:80%;

    padding:15px;

    margin:10px;

    border-radius:10px;

    border:none;

    font-size:18px;

    cursor:pointer;

}



.option{

    background:#eee;

    color:#222;

    text-align:left;

}



.option:hover{

    background:#ffd700;

}



#game{

    display:none;

}



.score{

    font-size:22px;

}



.enemy{

    color:#ffcc00;

}



.room{

    color:#00ff99;

    font-size:22px;

}



.result{

    font-size:30px;

    color:#ffd700;

}


</style>


</head>


<body>


<!-- ===============================
     登录界面
================================ -->


<div class="box" id="login">


<h1>
公务员行测竞技擂台
</h1>



<p>
⚔️ 在线行测PK竞技场
</p>



<button onclick="createRoom()">

创建房间

</button>



<br>



<input

id="roomInput"

placeholder="输入房间号"


style="
padding:12px;
width:70%;
font-size:18px;
border-radius:10px;
"



>



<button onclick="joinRoom()">

加入房间

</button>




<p id="msg">

正在连接服务器...

</p>




<p class="room" id="roomShow">

</p>



</div>









<!-- ===============================
     游戏界面
================================ -->


<div class="box" id="game">


<h2>

🔥 行测竞技PK

</h2>





<div class="score">


你的积分：

<span id="score">

0

</span>


</div>






<div class="enemy">


对手状态：

<span id="enemy">

等待中

</span>


</div>






<hr>






<div>


第

<span id="questionIndex">

1

</span>

题 / 共

<span id="questionTotal">

0

</span>

题


</div>







<div id="question">


等待题目...


</div>






</div>










<!-- ===============================
     结果界面
================================ -->


<div class="box" id="resultBox"

style="display:none">


<h1>

比赛结果

</h1>


<div class="result"

id="resultText">


</div>



<p id="finalScore">


</p>



<button onclick="location.reload()">

返回大厅

</button>



</div>


<script>


// ===============================
// WebSocket服务器
// ===============================


let socket = new WebSocket(

"wss://gongkao-pk-server.onrender.com"

);





// ===============================
// 游戏数据
// ===============================


let room=null;


let myId=null;


let score=0;


let currentQuestion=null;










// ===============================
// 连接成功
// ===============================


socket.onopen=function(){



    console.log(

        "服务器连接成功"

    );



    document.getElementById(
        "msg"
    ).innerHTML=

    "服务器连接成功";


};









// ===============================
// 连接错误
// ===============================


socket.onerror=function(){



    document.getElementById(
        "msg"
    ).innerHTML=

    "服务器连接失败";


};









// ===============================
// 接收服务器消息
// ===============================


socket.onmessage=function(e){



    let data=

    JSON.parse(e.data);




    console.log(

        "服务器消息:",

        data

    );









    // 连接成功


    if(data.type==="connected"){


        return;


    }









    // 创建房间成功


    if(data.type==="room"){



        room=data.room;


        myId=data.player;





        document.getElementById(
            "roomShow"
        ).innerHTML=

        "房间号："+room;






        document.getElementById(
            "msg"
        ).innerHTML=

        "等待对手加入...";



        return;


    }









    // 开始比赛


    if(data.type==="start"){



        document.getElementById(
            "login"
        ).style.display="none";



        document.getElementById(
            "game"
        ).style.display="block";




        return;


    }









    // 收到题目


    if(data.type==="question"){



        currentQuestion=

        data.question;





        document.getElementById(
            "questionIndex"
        ).innerHTML=

        data.index+1;





        document.getElementById(
            "questionTotal"
        ).innerHTML=

        data.total;





        showQuestion(

            data.question

        );




        return;


    }









    // 自己答题结果


    if(data.type==="result"){



        score=data.score;




        document.getElementById(
            "score"
        ).innerHTML=

        score;





        return;


    }









    // 对手状态


    if(data.type==="enemy"){



        document.getElementById(
            "enemy"
        ).innerHTML=

        "第"+

        data.index+

        "题 积分:"+

        data.score;



        return;


    }









    // 比赛结束


    if(data.type==="gameResult"){



        document.getElementById(
            "game"
        ).style.display="none";



        document.getElementById(
            "resultBox"
        ).style.display="block";





        if(data.win){


            document.getElementById(
                "resultText"
            ).innerHTML=

            "🏆 恭喜获胜！";


        }

        else if(data.result==="draw"){


            document.getElementById(
                "resultText"
            ).innerHTML=

            "🤝 平局";


        }

        else{


            document.getElementById(
                "resultText"
            ).innerHTML=

            "😢 下次加油";


        }





        document.getElementById(
            "finalScore"
        ).innerHTML=

        "你的分数："+

        data.myScore+

        "<br>对手分数："+

        data.enemyScore;



        return;


    }





};


// ===============================
// 创建房间
// ===============================


function createRoom(){



    if(socket.readyState!==1){



        alert(

            "服务器未连接"

        );

        return;


    }







    socket.send(JSON.stringify({



        type:"create",



        mode:"special",



        category:null



    }));



}









// ===============================
// 加入房间
// ===============================


function joinRoom(){



    let r=

    document.getElementById(

        "roomInput"

    ).value.trim();







    if(!r){



        alert(

            "请输入房间号"

        );


        return;


    }








    socket.send(JSON.stringify({



        type:"join",



        room:r



    }));



}









// ===============================
// 显示题目
// ===============================


function showQuestion(q){



    let html=

    "<h2>"+

    q.q+

    "</h2>";








    q.options.forEach((op,i)=>{



        html+=`


        <button

        class="option"

        onclick="answer(${i})">


        ${op}


        </button>


        `;



    });








    document.getElementById(

        "question"

    ).innerHTML=html;



}









// ===============================
// 答题
// ===============================


function answer(choice){



    if(!currentQuestion){


        return;


    }







    socket.send(JSON.stringify({



        type:"answer",



        choice:choice



    }));








    document.getElementById(

        "question"

    ).innerHTML=


    "等待判题...";



}








</script>


</body>


</html>
